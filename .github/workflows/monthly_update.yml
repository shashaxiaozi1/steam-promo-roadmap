name: Monthly Steam Sale Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

permissions:
  contents: write

jobs:
  update-steam-sales:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Steam sale crawler
        run: |
          python "33_AllPubSale 3.py"

      - name: Commit updated output files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add steam_sales_output/
          git commit -m "Update Steam sale data" || echo "No changes to commit"
          git push
